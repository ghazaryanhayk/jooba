# Jooba — local dev & reviewer run
# Usage: cp .env.example .env && docker compose up --build
# App: API http://localhost:8000  |  Web http://localhost:5173  |  DB internal: db:5432

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-jooba}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jooba}
      POSTGRES_DB: ${POSTGRES_DB:-jooba}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      # Expose for local tools (psql, GUI). Comment out if you prefer DB only on Docker network.
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-jooba} -d ${POSTGRES_DB:-jooba}"]
      interval: 3s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://jooba:jooba@db:5432/jooba}
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port 8000 --reload"

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      # Vite proxy to API (see frontend/vite.config.ts)
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    ports:
      - "${WEB_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app
      # Preserve container node_modules; entrypoint syncs when package-lock.json changes
      - web_node_modules:/app/node_modules
    depends_on:
      - api

volumes:
  pgdata:
  web_node_modules:
